[input]
image_path = $IMAGE_QUALITY_TOOL_HOME/test/data/bridge/simu_6px.tiff
#ROI = $IMAGE_QUALITY_TOOL_HOME/test/data/target1/shapefile/mtf_al_bagnolo.shp

[parameters]
# MANDATORY PARAMETERS
method = MTF_BRIDGE
band = 1

# METHOD PARAMETERS (shared with knife-edge)
scale = 0.01
offset = 0
px_margin = 0
edge_direction = AL
esf_model = esf_to_eq_space_polynomial
# sigmoid|esf_tanh|esf_fermi|esf_gauss_exp_param|esf_erf|esf_loess|esf_to_eq_space_polynomial
sampling = 0.1
input_angle = -5.0  # optional: if set, skips angle estimation from refineEdgeSubPx

# BRIDGE-SPECIFIC PARAMETERS
bridge_width = 6.0
# Physical width of the bridge target in pixels (LT_w)

[debug]
enabled = true
dir = $IMAGE_QUALITY_TOOL_HOME/output/bagnolo_bridge
